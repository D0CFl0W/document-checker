services:
  python_app:
    build: .
    container_name: docs-checker
    restart: unless-stopped
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
  nginx:
    image: nginx:alpine
    container_name: nginx_docs_checker
    restart: unless-stopped
    ports:
      - "33333:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - python_app
